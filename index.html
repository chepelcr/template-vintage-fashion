<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vintage Fashion Co. - Classic Styles, Timeless Elegance</title>
    <meta name="description" content="Discover timeless vintage fashion. Curated collection of classic clothing and accessories with nostalgic charm and luxury appeal." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts: Playfair Display (elegant serif) and Lora (classic body text) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

    <script>
      // Handle SPA routing for direct navigation
      (function() {
        const redirectPath = sessionStorage.getItem('redirect_path');
        if (redirectPath && redirectPath !== '/' && window.location.pathname !== redirectPath) {
          sessionStorage.removeItem('redirect_path');
          window.history.replaceState(null, '', redirectPath);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
