name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
  packages: read
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_IDENTITY_POOL_ID: us-east-1:be94bc45-883e-44ff-9eb7-3e58c23ea9e8
      VITE_AWS_REGION: us-east-1
      VITE_BASE_DOMAIN: examples.tsuru.jcampos.dev
      # Read @chepelcr/tsuru-storefront-sdk from GitHub Packages (same-owner public pkg).
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      # SDK is a new dep not yet in the committed lockfile → allow resolve/update.
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run build
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
