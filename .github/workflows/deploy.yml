name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
  packages: read
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_IDENTITY_POOL_ID: us-east-1:be94bc45-883e-44ff-9eb7-3e58c23ea9e8
      VITE_AWS_REGION: us-east-1
      VITE_BASE_DOMAIN: examples.tsuru.jcampos.dev
      # Read @chepelcr/tsuru-storefront-sdk from GitHub Packages (same-owner public pkg).
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
  notify:
    # Tell the org-site provisioner a new bundle is live so it re-mirrors every
    # provisioned org storefront using this template (TEMPLATE_UPDATED event).
    needs: deploy
    if: ${{ vars.AWS_TEMPLATE_EVENTS_ROLE_ARN != '' }}
    runs-on: ubuntu-latest
    continue-on-error: true # best-effort until the publisher role is deployed
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TEMPLATE_EVENTS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Publish TEMPLATE_UPDATED
        env:
          TOPIC_ARN: ${{ vars.TSURU_ORG_EVENTS_TOPIC_ARN }}
        run: |
          TEMPLATE_ID="${GITHUB_REPOSITORY##*/template-}"
          aws sns publish --topic-arn "$TOPIC_ARN" --message "$(printf '{"_type":"TemplateEvent","id":"gh-%s-%s","date":%s,"eventType":"TEMPLATE_UPDATED","data":{"templateId":"%s"}}' "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" "$(date +%s%3N)" "$TEMPLATE_ID")"
